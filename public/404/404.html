<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shipping with Purpose | System Lockout</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/main-home.css" />
    <style>
      .lockout-hero .hero__title {
        max-width: 12ch;
      }

      .lockout-alert {
        margin-top: var(--space-24);
        background: rgba(239, 68, 68, 0.08);
        border: 1px solid rgba(239, 68, 68, 0.35);
        color: #7f1d1d;
        padding: 14px 16px;
        border-radius: var(--radius-md);
        font-weight: 700;
      }

      .lockout-toast {
        position: fixed;
        left: 50%;
        bottom: 24px;
        transform: translateX(-50%) translateY(16px);
        opacity: 0;
        pointer-events: none;
        z-index: 2000;
        background: #111827;
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 999px;
        padding: 10px 18px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        transition: opacity 0.2s ease, transform 0.2s ease;
        font-size: 0.92rem;
        font-weight: 600;
        text-align: center;
      }

      .lockout-toast--visible {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    </style>
  </head>
  <body>
    <div data-include="header.html"></div>
    <div data-include="hero-lockout.html"></div>
    <div data-include="footer.html"></div>

    <div id="lockout-toast" class="lockout-toast" role="status" aria-live="polite">
      SRTtrail.error please reach to administrator or contact the business owner.
    </div>

    <script src="js/app.js" defer></script>
    <script src="js/components.js" defer></script>
    <script>
      (function lockoutInteractions() {
        const toast = document.getElementById('lockout-toast');
        let toastTimer;

        function showToast() {
          if (!toast) return;
          clearTimeout(toastTimer);
          toast.classList.add('lockout-toast--visible');
          toastTimer = setTimeout(() => {
            toast.classList.remove('lockout-toast--visible');
          }, 2200);
        }

        function disableInteractions() {
          const targets = document.querySelectorAll('a, button, [role="button"], input[type="submit"]');
          targets.forEach((el) => {
            el.addEventListener('click', (event) => {
              event.preventDefault();
              event.stopPropagation();
              showToast();
            });
          });
        }

        document.addEventListener('DOMContentLoaded', disableInteractions);
        document.addEventListener('components:loaded', disableInteractions);
      })();
    </script>
  </body>
</html>
